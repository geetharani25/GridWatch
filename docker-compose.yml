services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       gridwatch
      POSTGRES_USER:     gridwatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://gridwatch:${POSTGRES_PASSWORD}@postgres:5432/gridwatch
      REDIS_URL:    redis://redis:6379
      JWT_SECRET:   ${JWT_SECRET}
      NODE_ENV:     production
      PORT:         3000
      CORS_ORIGIN:  http://localhost
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  backend-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://gridwatch:${POSTGRES_PASSWORD}@postgres:5432/gridwatch
      REDIS_URL:    redis://redis:6379
      JWT_SECRET:   ${JWT_SECRET}
      NODE_ENV:     production
    depends_on:
      postgres: { condition: service_healthy }
      backend:  { condition: service_started }
    command: ["node", "dist/db/seed/seed.js"]
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
